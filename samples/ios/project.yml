name: TraccarClientSample
options:
  bundleIdPrefix: org.traccar.client.sample
  deploymentTarget:
    iOS: "15.0"
packages:
  TraccarClientSDK:
    path: ../../core
targets:
  TraccarClientSample:
    type: application
    platform: iOS
    sources: [TraccarClientSample]
    info:
      path: TraccarClientSample/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: Required for location tracking.
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.traccar.client.sample
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.5"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        OTHER_LDFLAGS: -lsqlite3
    dependencies:
      - package: TraccarClientSDK
        product: TraccarClientSDK
    preBuildScripts:
      - name: Build TraccarClientSDK XCFramework
        basedOnDependencyAnalysis: false
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../.."
          ./gradlew :core:assembleTraccarClientSDKReleaseXCFramework
