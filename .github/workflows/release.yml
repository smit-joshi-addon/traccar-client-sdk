name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Build XCFramework
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :core:assembleTraccarClientSDKReleaseXCFramework

      - name: Package and tag the XCFramework
        run: |
          (cd core/build/XCFrameworks/release && zip -r -y TraccarClientSDK.xcframework.zip TraccarClientSDK.xcframework)
          CHECKSUM=$(swift package compute-checksum core/build/XCFrameworks/release/TraccarClientSDK.xcframework.zip)
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/TraccarClientSDK.xcframework.zip"
          sed -i '' "s|path: \"build/XCFrameworks/release/TraccarClientSDK.xcframework\"|url: \"$ASSET_URL\", checksum: \"$CHECKSUM\"|" core/Package.swift
          grep -q "$CHECKSUM" core/Package.swift
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core/Package.swift
          git commit -m "Release ${GITHUB_REF_NAME}"
          git tag -f "${GITHUB_REF_NAME}"
          git push -f origin "${GITHUB_REF_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            core/build/XCFrameworks/release/TraccarClientSDK.xcframework.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
